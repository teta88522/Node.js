<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

    <div class="board-container">
        <div class="board-header">
            <h2>자유 게시판</h2>
            <a href="board.html" class="btn-write">새 글 작성</a> 
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-no">번호</th>
                    <th class="col-title">제목</th>
                    <th class="col-content">작성자</th>
                    <th class="col-author">날짜</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>3</td>
                    <td class="col-title truncate">Node.js 백엔드 재밌네요</td>
                    <td class="col-content truncate">처음에는 에러가 많이 나서 당황했는데, 하나씩 고쳐가니까 작동하는 게 신기합니다.</td>
                    <td>김코딩</td>
                </tr>
                
                <tr>
                    <td>2</td>
                    <td class="col-title truncate">Express 라우터 질문있습니다.</td>
                    <td class="col-content truncate">경로를 분리하려고 하는데 req.body가 계속 undefined로 뜹니다. 어떻게 해결해야 할까요?</td>
                    <td>이개발</td>
                </tr>
                
                <tr>
                    <td>1</td>
                    <td class="col-title truncate">게시판 첫 글 테스트입니다.</td>
                    <td class="col-content truncate">안녕하세요. 게시판 만들기 프로젝트 시작합니다. 화이팅!</td>
                    <td>박초보</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
      //페이지가 로딩되면서 데이터를 가져와야함
      fetch("./api/board")
        .then((resp) => resp.json())
        .then((data) => {
        console.log(data)
          //tr의 상위요소에 insertAdjacentHTML() 함수활용
          const parent = document.querySelector("tbody");
          parent.innerHTML = ''
          //for .. of 반복문
          for (let board of data) {
            console.log(board);
            const { board_id, title, name, created_at } = board;
            const html = `<tr>
                            <td>${board_id}</td>
                            <td class="text-left">
                            <a href="/boardDetail.html" data-page="${board_id}">${title}</a>
                            </td>
                            <td>${name}</td>
                            <td>${created_at}</td>
                            </tr>`;
            parent.insertAdjacentHTML("beforeend", html);
          } // end of for
          //a 태그의 요소를 가져와서 클릭이벤트
        document.querySelectorAll("tbody a").forEach((elem) => {
            elem.addEventListener("click", (e) => {
            e.preventDefault();
              //클릭한 글번호를 localStorage = 저장
            localStorage.setItem("page", e.target.dataset.page);
            location.href = "boardDetail.html";
            });
          });
        })

        .catch(console.log);
    </script>

</body>
</html>
