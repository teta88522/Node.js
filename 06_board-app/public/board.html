<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 글 작성</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>새 글 작성</h2>
        <form action="/api/insert" method="POST" id="form">
            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
            </div>
            
            <div class="form-group">
                <label for="author">작성자</label>
                <input type="text" id="author" name="author" placeholder="작성자 이름" required>
            </div>
            
            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" rows="6" placeholder="내용을 입력하세요" required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">등록하기</button>
        </form>
    </div>

    <script>
      document.querySelector('form').addEventListener('submit', (e) =>{
        e.preventDefault();
        // console.log(e)
        const title = document.querySelector('#title').value
        const content = document.querySelector('#content').value
        const author = document.querySelector('#author').value
        const postData = {title : title, content:content
                .split("\n")
                .map((elem) => `<p>${elem}</p>`)
                .join(""), 
                writer_id:author}

        if (!postData.title || !postData.content || !postData.writer_id) {
            return;
        }
        // ajax 호출
        fetch('./api/board', {
        method :'post',
        headers :{'Content-Type' : 'application/json',
        Authorization: "Bearer " + localStorage.getItem("token"),
        },
        body : JSON.stringify({
            title:postData.title,
            content:postData.content
        })
        }
        
        )
            .then((resp) => resp.json())
            .then((data) => {
            if (data.retCode == "OK") {
                // 성공 후 이동할 페이지 (글목록페이지)
                alert("[등록 성공] 글목록으로 이동.");
                location.href = "board_list.html";
            } else {
                // 실패 후 에러메세지 (결과를 화면에 출력)
                alert(`[에러] ${data.retMsg}`);
            }
            })
            .catch(console.log);
        });

    </script>
</body>
</html>
